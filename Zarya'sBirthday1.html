<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letters</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: #f4ecd8;
    color: #3b2f2f;
    text-align: center;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.envelope {
    width: 300px;
    height: 200px;
    background: #d8c3a5;
    position: relative;
    cursor: pointer;
    border: 2px solid #8b6f47;
}

.envelope:before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    border-left: 150px solid transparent;
    border-right: 150px solid transparent;
    border-top: 100px solid #c1a57b;
}

.envelope-text {
    position: absolute;
    width: 100%;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
}

.letters {
    display: none;
    padding: 20px;
}

.letter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 15px;
    max-width: 600px;
    margin: auto;
}

.letter {
    padding: 20px;
    border: 1px solid #8b6f47;
    background: #fffaf0;
    cursor: pointer;
}

.letter:hover {
    background: #f0e4c3;
}

.page {
    display: none;
    padding: 40px;
}

.back {
    margin-top: 20px;
    cursor: pointer;
    color: #5a3e2b;
}
</style>
</head>

<body>

<div id="passwordScreen" style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;">
    <h2>Enter Password</h2>
    <input type="password" id="passwordInput" placeholder="Password" style="padding:10px;font-size:16px;margin:10px;">
    <button onclick="checkPassword()" style="padding:10px 20px;cursor:pointer;">Unlock</button>
    <p id="error" style="color:red;display:none;">Incorrect password</p>
</div>

<div id="mainContent" style="display:none;">

<div class="container" id="home">
    <div class="envelope" onclick="openEnvelope()">
        <div class="envelope-text">Open Letter</div>
    </div>
</div>

<div class="letters" id="letters">
    <h2>My Letters</h2>
    <div class="letter-grid">
        <!-- 18 Letters -->
        <script>
            for(let i=1;i<=18;i++){
                document.write(`<div class='letter' onclick='openLetter(${i})'>Letter ${i}</div>`);
            }
        </script>
    </div>
</div>

<!-- Letter Pages -->
<div class='page' id='page1'>
    <h2>Letter 1</h2>
    <p>Hi Zarya</p>
    <div class='back' onclick='goBack()'>← Back</div>
</div>

<div class='page' id='page2'>
    <h2>Letter 2</h2>
    <p>Hello Zarya</p>
    <div class='back' onclick='goBack()'>← Back</div>
</div>

<div class='page' id='page3'>
    <h2>Letter 3</h2>
    <p>Your Letter 3 here...</p>
    <div class='back' onclick='goBack()'>← Back</div>
</div>
       

</script>

<script>
function openEnvelope(){
    document.getElementById('home').style.display='none';
    document.getElementById('letters').style.display='block';
}

function openLetter(num){
    document.getElementById('letters').style.display='none';
    document.getElementById('page'+num).style.display='block';
}

function goBack(){
    document.querySelectorAll('.page').forEach(p=>p.style.display='none');
    document.getElementById('letters').style.display='block';
}
</script>

</div>

<script>
function checkPassword(){
    const correctPassword = "CeaZar";
    const input = document.getElementById('passwordInput').value;

    if(input === correctPassword){
        document.getElementById('passwordScreen').style.display='none';
        document.getElementById('mainContent').style.display='block';
    } else {
        document.getElementById('error').style.display='block';
    }
}
</script>

</body>
</html>
